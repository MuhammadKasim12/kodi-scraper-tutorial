# fly.toml app configuration file generated for kasim-url-code-svc on 2026-07-02T14:34:43-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'kasim-url-code-svc'
primary_region = 'sjc'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  # false (not true) on purpose: the phone control page needs to be loadable
  # over plain http, since it makes a plain-http fetch to Kodi's local
  # JSON-RPC endpoint -- browsers block that fetch as mixed content if the
  # page itself was loaded over https. https:// still works for API calls
  # (curl, addon.py) either way; this only stops the http->https redirect.
  force_https = false
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
